<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Manager Portal</h1>

    <div id="dashboardSummary" style="display:flex; gap:15px; margin-bottom:20px; flex-wrap:wrap;">
        <div style="border:1px solid #ccc; padding:15px; min-width:180px;">
            <h3>Pending Requests</h3>
            <div id="pendingRequestsCount" style="font-size:28px; font-weight:bold; color:#b22222;">0</div>


        <div style="border:1px solid #ccc; padding:15px; min-width:180px;">
            <h3>Active Notices</h3>
            <div id="activeNoticesCount" style="font-size:28px; font-weight:bold; color:#ff8c00;">0</div>


        <div style="border:1px solid #ccc; padding:15px; min-width:180px;">
            <h3>Unread Announcements</h3>
            <div id="unreadAnnouncementsCount" style="font-size:28px; font-weight:bold; color:#1e90ff;">0</div>
            
    </div>
    <button onclick="goToEmployee()" style="margin-bottom:15px;">
    Back to Employee Portal
</button>

    <h2>Post Announcement</h2>
    <textarea id="announcementInput" placeholder="Type announcement here"></textarea>
    <br>
    <button onclick="postAnnouncement()">Post Announcement</button>

    <h2>Send Required Notice</h2>
    <select id="employeeSelect">
        <option value="Austin">Austin</option>
        <option value="Employee1">Employee 1</option>
        <option value="Employee2">Employee 2</option>
    </select>
    <br><br>
    <textarea id="noticeInput" placeholder="Type required notice here"></textarea>
    <br>
    <button onclick="sendNotice()">Send Required Notice</button>

    <h2>Time Off Requests</h2>

    <div style="margin-bottom: 15px;">
        <button onclick="showRequestSection('active')">Active Requests</button>
        <button onclick="showRequestSection('history')">Request History</button>
    </div>

    <div id="activeRequestsSection">
        <h3>Active Requests</h3>
        <div id="requests"></div>
    </div>

    <div id="historyRequestsSection" style="display:none;">
        <h3>Request History</h3>
        <div id="requestHistory"></div>
    </div>

    <h2>Notice Tracking</h2>

    <div style="margin-bottom: 15px;">
        <button onclick="showNoticeSection('active')">Active Notices</button>
        <button onclick="showNoticeSection('history')">Notice History</button>
    </div>

    <div id="activeNoticeSection">
        <h3>Active Notices</h3>
        <div id="noticeTracking"></div>
    </div>

    <div id="historyNoticeSection" style="display:none;">
        <h3>Notice History</h3>
        <div id="noticeHistory"></div>
    </div>

    <script src="script.js"></script>
    <script>
        checkManagerAccess();
    </script>
</body>
</html>
